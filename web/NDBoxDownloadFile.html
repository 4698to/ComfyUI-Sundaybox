<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NDBox Download File</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #1a1a1a;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 13px;
        }
        #container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #file-info {
            padding: 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
            word-break: break-all;
        }
        #status {
            font-size: 12px;
            opacity: 0.8;
        }
        #download-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
        }
        #download-btn {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #2b2b2b;
            color: #fff;
            font-size: 13px;
        }
        #download-btn[disabled] {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="file-info">等待节点传入文件路径…</div>
        <div id="download-row">
            <button id="download-btn" type="button" disabled>下载文件</button>
            <div id="status">Viewer not ready</div>
        </div>
    </div>

    <script>
        // 全局状态 + 函数（方便外部直接调用 initViewer）
        let currentFileName = null;
        let currentDownloadId = null;
        let currentFileExists = false;
        let currentFileSizeBytes = null;
        let currentFilePath = null;

        const fileInfoEl = document.getElementById('file-info');
        const statusEl = document.getElementById('status');
        const downloadBtn = document.getElementById('download-btn');

        function updateUI() {
            console.log("[NDBoxDownloadFile][iframe] updateUI:", {
                currentFileName,
                currentDownloadId,
                currentFileExists,
                currentFileSizeBytes,
                currentFilePath,
            });
            if (!currentFileName || !currentDownloadId) {
                fileInfoEl.textContent = "未收到文件信息。";
                downloadBtn.disabled = true;
                statusEl.textContent = "No download token provided from node.";
                return;
            }

            let sizeText = "";
            if (typeof currentFileSizeBytes === "number" && currentFileSizeBytes >= 0) {
                const kb = currentFileSizeBytes / 1024;
                const mb = kb / 1024;
                if (mb >= 1) {
                    sizeText = ` (${mb.toFixed(2)} MB)`;
                } else if (kb >= 1) {
                    sizeText = ` (${kb.toFixed(2)} KB)`;
                } else {
                    sizeText = ` (${currentFileSizeBytes} B)`;
                }
            }

            const pathText = currentFilePath ? `\n路径: ${currentFilePath}` : "";
            fileInfoEl.textContent = `${pathText}${sizeText}`;

            if (!currentFileExists) {
                statusEl.textContent = "后端报告该文件不存在，无法下载。";
                downloadBtn.disabled = true;
            } else {
                statusEl.textContent = "文件已就绪，点击按钮通过安全下载链接获取。";
                downloadBtn.disabled = false;
            }
        }

        function downloadFile() {
            if (!currentDownloadId) return;

            const url = `/NDBox/download_file/${encodeURIComponent(currentDownloadId)}`;
            const a = document.createElement("a");
            a.href = url;
            a.download = currentFileName || "download.bin";
            document.body.appendChild(a);
            a.click();
            a.remove();

            // 通知父窗口一次操作（可选）
            try {
                window.parent.postMessage({ type: "NDBOX_DOWNLOAD_TRIGGERED", fileName: currentFileName, downloadId: currentDownloadId }, "*");
            } catch (e) {
                console.warn("[NDBoxDownloadFile] postMessage failed:", e);
            }
        }

        function handleMessage(event) {
            console.log("[NDBoxDownloadFile][iframe] received message:", event.data);
            const data = event.data || {};

            if (data.type === "loadFileForDownload") {
                currentFileName = data.fileName || null;
                currentDownloadId = data.downloadId || null;
                currentFileExists = !!data.fileExists;
                currentFileSizeBytes = (typeof data.fileSizeBytes === "number") ? data.fileSizeBytes : null;
                currentFilePath = data.filePath || null;
                updateUI();
            }
        }

        function initViewer() {
            // 入口函数：绑定事件并通知父窗口
            downloadBtn.addEventListener('click', downloadFile);
            window.addEventListener("message", handleMessage);

            window.parent.postMessage({ type: "NDBOX_DOWNLOAD_VIEW_READY" }, "*");
            statusEl.textContent = "Viewer ready, waiting for download token…";
        }

        // IIFE 作为自动入口，只负责调用 initViewer；initViewer 本身在外面可复用
        (function () {
            initViewer();
        })();
    </script>
</body>
</html>
